<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>入試数学ドリル — 中学・高校数学トレーニング</title>
<style>
:root{
  --paper:#f6f5f0; --card:#fffefb; --ink:#1c2438; --mut:#636a7e; --line:#dcdbd1;
  --grid:rgba(43,76,155,.07);
  --shu:#c9333f; --shu-ink:#b02a35; --shu-soft:#fbeef0;
  --ai:#2b4c9b; --ai-ink:#233f80; --ai-soft:#edf1fa;
  --dim:rgba(28,36,56,.05);
  --sh:0 1px 2px rgba(28,36,56,.05),0 10px 28px rgba(28,36,56,.07);
  --mincho:'Hiragino Mincho ProN','Yu Mincho',YuMincho,'Noto Serif JP','Noto Serif CJK JP','Times New Roman',serif;
  --gothic:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',Meiryo,'Noto Sans JP','Noto Sans CJK JP',system-ui,sans-serif;
  --math:Georgia,'Times New Roman',serif;
}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --paper:#131722; --card:#1c2130; --ink:#e9ebf3; --mut:#9aa1b5; --line:#313848;
    --grid:rgba(125,155,255,.055);
    --shu:#f0616c; --shu-ink:#ff7a83; --shu-soft:#39222a;
    --ai:#5d7fe8; --ai-ink:#8aa5ff; --ai-soft:#232d47;
    --dim:rgba(233,235,243,.06);
    --sh:0 1px 2px rgba(0,0,0,.35),0 10px 28px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --paper:#131722; --card:#1c2130; --ink:#e9ebf3; --mut:#9aa1b5; --line:#313848;
  --grid:rgba(125,155,255,.055);
  --shu:#f0616c; --shu-ink:#ff7a83; --shu-soft:#39222a;
  --ai:#5d7fe8; --ai-ink:#8aa5ff; --ai-soft:#232d47;
  --dim:rgba(233,235,243,.06);
  --sh:0 1px 2px rgba(0,0,0,.35),0 10px 28px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;color:var(--ink);background:var(--paper);font-family:var(--gothic);
  font-size:15px;line-height:1.7;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:24px 24px;
}
.wrap{max-width:900px;margin:0 auto;padding:28px 18px 70px}
.hide{display:none!important}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--ai);outline-offset:2px;border-radius:3px}

/* ---------- home ---------- */
.hero{display:flex;align-items:center;justify-content:center;gap:22px;padding:26px 8px 30px;text-align:center}
.hero-t h1{font-family:var(--mincho);font-weight:600;font-size:clamp(1.9rem,5.5vw,2.7rem);letter-spacing:.08em;margin:0;text-wrap:balance}
.hero-t .sub{color:var(--mut);margin:8px 0 0;font-size:.92rem;letter-spacing:.05em}
.hero-t .eyebrow{font-size:.75rem;letter-spacing:.32em;color:var(--shu);margin:0 0 6px;font-weight:600}
.hanko{flex:none;width:64px;height:64px;border:2.5px solid var(--shu);color:var(--shu);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-family:var(--mincho);font-weight:600;
  font-size:1.35rem;letter-spacing:.1em;line-height:1.15;transform:rotate(-7deg);padding:4px;
  writing-mode:vertical-rl;opacity:.92}
.sec{margin-top:26px}
.sec-h{display:flex;align-items:baseline;gap:12px;border-bottom:2px solid var(--ink);padding-bottom:8px;margin:0 0 16px}
.sec-h h2{font-family:var(--mincho);font-weight:600;font-size:1.22rem;letter-spacing:.14em;margin:0}
.sec-h .for{font-size:.78rem;color:var(--shu);font-weight:600;letter-spacing:.12em}
.sec-h .note{margin-left:auto;font-size:.74rem;color:var(--mut)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.ucard{position:relative;display:flex;flex-direction:column;gap:6px;text-align:left;
  background:var(--card);border:1px solid var(--line);border-radius:3px;box-shadow:var(--sh);
  padding:18px 16px 14px;margin-top:10px;transition:transform .16s ease,border-color .16s ease}
.ucard:hover{transform:translateY(-2px);border-color:var(--ai)}
.utab{position:absolute;top:-10px;right:14px;color:#fff;background:var(--uc,#2b4c9b);
  font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:2px 10px 1px;border-radius:2px;
  box-shadow:0 2px 5px rgba(28,36,56,.25)}
.uname{font-family:var(--mincho);font-weight:600;font-size:1.28rem;letter-spacing:.1em}
.uname .exam-b{display:inline-block;font-family:var(--gothic);font-size:.68rem;font-weight:700;color:var(--shu);
  border:1.5px solid var(--shu);border-radius:2px;padding:0 6px;margin-left:8px;vertical-align:2px;letter-spacing:.15em}
.utopics{font-size:.8rem;color:var(--mut);line-height:1.6;min-height:2.6em}
.ubest{font-size:.78rem;color:var(--mut);border-top:1px dashed var(--line);padding-top:8px;margin-top:auto;
  display:flex;justify-content:space-between;font-variant-numeric:tabular-nums}
.ubest b{color:var(--ink);font-weight:600}
.foot{margin-top:40px;text-align:center;color:var(--mut);font-size:.78rem;letter-spacing:.05em}
.kbd{display:inline-block;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;
  padding:0 6px;font-size:.72rem;background:var(--card);font-variant-numeric:tabular-nums}

/* ---------- game ---------- */
.gbar{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.gtitle{font-family:var(--mincho);font-weight:600;letter-spacing:.1em;font-size:1.05rem}
.gstats{margin-left:auto;display:flex;align-items:center;gap:10px;font-variant-numeric:tabular-nums}
.score-l{font-size:.72rem;color:var(--mut);letter-spacing:.1em}
.score-v{font-size:1.25rem;font-weight:700}
.chip{font-size:.75rem;font-weight:700;color:var(--shu);border:1.5px solid var(--shu);
  border-radius:999px;padding:1px 10px;letter-spacing:.05em}
.chip.pop{animation:pop .3s ease}
.qmeta{display:flex;align-items:baseline;gap:10px;margin:14px 2px 6px}
.qnum{font-family:var(--mincho);font-weight:600;font-size:1.02rem;letter-spacing:.08em}
.qtag{font-size:.72rem;color:var(--ai-ink);background:var(--ai-soft);padding:1px 9px;border-radius:2px;letter-spacing:.06em}
.qtotal{margin-left:auto;font-size:.76rem;color:var(--mut);font-variant-numeric:tabular-nums}
.timer{height:5px;background:var(--dim);border-radius:99px;overflow:hidden;margin:2px 0 14px}
.timer i{display:block;height:100%;width:100%;background:var(--ai);border-radius:99px;transition:width .1s linear}
.timer.low i{background:var(--shu)}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:3px;box-shadow:var(--sh);
  padding:26px 22px;margin-bottom:16px;animation:qin .25s ease}
.qtext{font-size:1.32rem;line-height:2.15;overflow-x:auto;overflow-y:hidden;padding-bottom:2px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:600px){.choices{grid-template-columns:1fr}.hero{flex-direction:column;gap:14px}}
.ch{display:flex;align-items:center;gap:12px;text-align:left;font-size:1.06rem;line-height:1.9;
  background:var(--card);color:var(--ink);border:1.5px solid var(--line);border-radius:3px;
  padding:11px 14px;box-shadow:var(--sh);transition:border-color .12s,transform .12s}
.ch:hover:not(:disabled){border-color:var(--ai);transform:translateY(-1px)}
.ch:disabled{cursor:default}
.ch .no{flex:none;font-size:1.15rem;color:var(--mut);font-family:var(--gothic)}
.ch .cv{overflow-x:auto;overflow-y:hidden}
.ch.correct{border-color:var(--shu);background:var(--shu-soft);box-shadow:none}
.ch.correct .no{color:var(--shu);font-weight:700}
.ch.wrong{border-color:var(--mut);background:var(--dim);box-shadow:none;animation:shake .3s ease}
.ch.dim{opacity:.45;box-shadow:none}
.fb{display:flex;gap:16px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
  border-radius:3px;box-shadow:var(--sh);padding:16px 18px;margin-top:16px;animation:qin .2s ease}
.mark{flex:none;width:58px;height:58px;display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;font-weight:600;border-radius:6px;animation:stamp .32s cubic-bezier(.2,1.4,.4,1)}
.fb.ok .mark{color:var(--shu);border:2.5px solid var(--shu);transform:rotate(-6deg)}
.fb.ng .mark{color:var(--mut);border:2.5px solid var(--mut);transform:rotate(-6deg)}
.fb-t{flex:1;min-width:0}
.fb-h{font-weight:700;font-size:1.02rem;letter-spacing:.06em}
.fb.ok .fb-h{color:var(--shu)}
.fb-e{font-size:.9rem;color:var(--mut);margin-top:3px;line-height:1.9;overflow-x:auto}
.fb-e b{color:var(--ink)}
.fb-next{margin-top:10px}

/* ---------- result ---------- */
.res{background:var(--card);border:1px solid var(--line);border-radius:3px;box-shadow:var(--sh);
  padding:40px 24px;text-align:center;margin-top:24px}
.res-unit{font-family:var(--mincho);letter-spacing:.15em;color:var(--mut);font-size:.95rem}
.stamp{width:110px;height:110px;margin:20px auto 6px;border:3.5px solid var(--shu);border-radius:8px;
  color:var(--shu);display:flex;align-items:center;justify-content:center;
  font-family:var(--mincho);font-size:4rem;font-weight:600;transform:rotate(-7deg);
  animation:stamp .4s cubic-bezier(.2,1.4,.4,1)}
.rank-t{font-family:var(--mincho);font-size:1.15rem;letter-spacing:.2em;color:var(--shu);font-weight:600;margin-top:10px}
.res-score{font-size:2.4rem;font-weight:700;font-variant-numeric:tabular-nums;margin-top:14px;line-height:1.2}
.res-score small{font-size:1rem;color:var(--mut);font-weight:400;margin-left:4px}
.newbest{display:inline-block;margin-top:8px;color:var(--shu);border:1.5px solid var(--shu);
  border-radius:999px;font-size:.78rem;font-weight:700;padding:1px 12px;letter-spacing:.1em}
.res-stats{display:flex;justify-content:center;gap:26px;margin-top:22px;font-variant-numeric:tabular-nums;flex-wrap:wrap}
.rs .l{font-size:.72rem;color:var(--mut);letter-spacing:.12em}
.rs .v{font-size:1.3rem;font-weight:700}
.res-btns{display:flex;justify-content:center;gap:12px;margin-top:30px;flex-wrap:wrap}

/* ---------- buttons ---------- */
.btn{border:none;border-radius:3px;background:var(--ai);color:#fff;font-weight:700;
  font-size:.92rem;letter-spacing:.08em;padding:10px 22px;box-shadow:var(--sh);transition:transform .12s,opacity .12s}
.btn:hover{transform:translateY(-1px);opacity:.92}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn.ghost:hover{border-color:var(--ai);color:var(--ai-ink)}
.btn.sm{padding:5px 12px;font-size:.78rem}

/* ---------- math ---------- */
i,var{font-family:var(--math);font-style:italic}
sup,sub{font-size:.68em;line-height:1}
.fr{display:inline-flex;flex-direction:column;vertical-align:-.55em;text-align:center;
  margin:0 2px;line-height:1.25;font-size:.9em}
.fr>span{padding:0 4px}
.fr>span:first-child{border-bottom:1.4px solid currentColor}
.rt{white-space:nowrap}
.rt .vin{border-top:1.4px solid currentColor;padding:0 2px 0 1px}
.vc{position:relative;display:inline-block;font-family:var(--math);font-style:italic;padding:0 2px;margin-top:.4em}
.vc::before{content:"\2192";position:absolute;top:-1em;left:50%;transform:translateX(-50%);font-size:.62em;font-style:normal}
.dt{display:inline-block;text-align:center;border:1px dashed var(--line);border-radius:3px;
  padding:2px 12px;font-variant-numeric:tabular-nums;letter-spacing:.08em}

@keyframes qin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes stamp{from{opacity:0;transform:scale(1.7) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(-6deg)}}
@keyframes pop{50%{transform:scale(1.18)}}
@keyframes shake{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div id="scr-home" class="scr">
    <header class="hero">
      <div class="hero-t">
        <p class="eyebrow">高校受験・大学受験対応</p>
        <h1>入試数学ドリル</h1>
        <p class="sub">中学数学・高校数学 全11コース ─ 問題は毎回自動生成</p>
      </div>
      <div class="hanko" aria-hidden="true">必勝</div>
    </header>
    <section class="sec">
      <div class="sec-h"><h2>中学数学</h2><span class="for">高校受験</span><span class="note">学年別＋受験対策</span></div>
      <div class="grid" id="grid-jhs"></div>
    </section>
    <section class="sec">
      <div class="sec-h"><h2>高校数学</h2><span class="for">大学受験</span><span class="note">科目別＋受験対策</span></div>
      <div class="grid" id="grid-hs"></div>
    </section>
    <p class="foot">1回10問・4択。<span class="kbd">1</span>〜<span class="kbd">4</span>キーで解答、<span class="kbd">Enter</span>で次の問題へ。成績はこの端末に保存されます。</p>
  </div>

  <div id="scr-game" class="scr hide">
    <div class="gbar">
      <button class="btn ghost sm" id="btn-quit">← コース選択</button>
      <div class="gtitle" id="g-unit"></div>
      <div class="gstats">
        <span id="g-streak" class="chip hide"></span>
        <span><span class="score-l">SCORE</span> <span class="score-v" id="g-score">0</span></span>
      </div>
    </div>
    <div class="qmeta">
      <span class="qnum" id="g-num">第1問</span>
      <span class="qtag" id="g-topic"></span>
      <span class="qtotal" id="g-prog">1 / 10</span>
    </div>
    <div class="timer" id="g-timerbox"><i id="g-timer"></i></div>
    <div class="qcard"><div class="qtext" id="g-q"></div></div>
    <div class="choices" id="g-choices"></div>
    <div id="g-fb" class="fb hide">
      <div class="mark" id="g-mark"></div>
      <div class="fb-t">
        <div class="fb-h" id="g-fbh"></div>
        <div class="fb-e" id="g-fbe"></div>
        <button class="btn fb-next" id="btn-next">次へ ▸</button>
      </div>
    </div>
  </div>

  <div id="scr-res" class="scr hide">
    <div class="res">
      <div class="res-unit" id="r-unit"></div>
      <div class="stamp" id="r-rank">S</div>
      <div class="rank-t" id="r-rankt"></div>
      <div class="res-score"><span id="r-score">0</span><small>点</small></div>
      <div><span class="newbest hide" id="r-best">ベスト更新！</span></div>
      <div class="res-stats">
        <div class="rs"><div class="l">正解数</div><div class="v" id="r-correct">0/10</div></div>
        <div class="rs"><div class="l">最大連続正解</div><div class="v" id="r-streak">0</div></div>
        <div class="rs"><div class="l">自己ベスト</div><div class="v" id="r-hi">0</div></div>
      </div>
      <div class="res-btns">
        <button class="btn" id="btn-retry">もう一度挑戦</button>
        <button class="btn ghost" id="btn-home">コース選択へ</button>
      </div>
    </div>
  </div>

</div>
<script>
'use strict';
/* ============ utilities ============ */
const $=id=>document.getElementById(id);
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[ri(0,a.length-1)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=ri(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;};
const gcd=(a,b)=>{a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;};
const M='−'; // minus sign
const fm=n=>{if(typeof n==='number'&&!Number.isInteger(n))n=Math.round(n*1000)/1000;return String(n).replace(/-/g,M);};
const pn=n=>n<0?`(${fm(n)})`:fm(n); // wrap negatives in ()
const sup=s=>`<sup>${s}</sup>`;
const it=s=>`<i>${s}</i>`;
const X=it('x'),Y=it('y'),N_=it('n'),TH=it('θ');
const X2=X+sup(2),X3=X+sup(3);
const fr=(a,b)=>`<span class="fr"><span>${a}</span><span>${b}</span></span>`;
const frq=(n,d)=>{if(d<0){n=-n;d=-d;}const g=gcd(n,d)||1;n/=g;d/=g;
  if(d===1)return fm(n);return (n<0?M:'')+fr(fm(Math.abs(n)),fm(d));};
const rt=x=>`<span class="rt">√<span class="vin">${x}</span></span>`;
const srt=(k,x)=>(k===1?'':k===-1?M:fm(k))+rt(x);
const vec=s=>`<span class="vc">${s}</span>`;
const DEG='°';
/* build "3x² − 4x + 1" from [coef, varHtml] pairs */
const term=(c,v,first)=>{if(c===0)return'';
  const a=Math.abs(c);let s=first?(c<0?M:''):(c<0?` ${M} `:' + ');
  s+=(a===1&&v)?'':fm(a);return s+v;};
const poly=(...cv)=>{let s='',first=true;
  for(const[c,v]of cv){if(c===0)continue;s+=term(c,v,first);first=false;}
  return s||'0';};
const linEx=(p,q,v)=>poly([p,v||X],[q,'']);

/* ============ MCQ builders ============ */
function mk(q,topic,correct,wrongs,e){
  const cs=[String(correct)],seen=new Set(cs);
  for(const w of wrongs){const s=String(w);
    if(!seen.has(s)){seen.add(s);cs.push(s);}if(cs.length===4)break;}
  while(cs.length<4){const s=fm(ri(2,199));if(!seen.has(s)){seen.add(s);cs.push(s);}}
  const idx=shuffle([0,1,2,3]);
  return {q,topic,c:idx.map(i=>cs[i]),a:idx.indexOf(0),e};
}
function numMC(q,topic,ans,e,fmt){fmt=fmt||fm;
  const seen=new Set([ans]),w=[];
  const cand=shuffle([ans+1,ans-1,ans+2,ans-2,-ans,2*ans,ans+5,ans-5,ans+10,ans-10,ans+3,ans-3]);
  for(const c of cand){if(w.length===3)break;if(!seen.has(c)){seen.add(c);w.push(c);}}
  while(w.length<3){const c=ans+ri(1,30)*(ri(0,1)?1:-1);if(!seen.has(c)){seen.add(c);w.push(c);}}
  return mk(q,topic,fmt(ans),w.map(fmt),e);
}
function fracMC(q,topic,n,d,e){
  if(d<0){n=-n;d=-d;}const g=gcd(n,d)||1;n/=g;d/=g;
  const key=(a,b)=>{if(b<0){a=-a;b=-b;}const g2=gcd(a,b)||1;return (a/g2)+'/'+(b/g2);};
  const seen=new Set([key(n,d)]),w=[];
  const cand=shuffle([[n+1,d],[n-1,d],[n,d+1],[n,d-1],[d,n],[-n,d],[2*n,d],[n,2*d]]);
  for(const[a,b]of cand){if(w.length===3)break;if(!b||!a&&!n)continue;
    const k=key(a,b);if(!seen.has(k)){seen.add(k);w.push(frq(a,b));}}
  while(w.length<3){const a=n+ri(1,6),b=d+ri(1,6);const k=key(a,b);
    if(!seen.has(k)){seen.add(k);w.push(frq(a,b));}}
  return mk(q,topic,frq(n,d),w,e);
}
/* linear-expression answer px+q */
function linMC(qs,topic,p,q,e,v,pre){v=v||X;pre=pre||'';
  const f=(a,b)=>pre+linEx(a,b,v);
  const cands=shuffle([[p+1,q],[p-1,q],[p,q+1],[p,q-1],[-p,q],[p,-q],[p+2,q-2]]);
  return mk(qs,topic,f(p,q),cands.map(c=>f(c[0],c[1])),e);
}
const GENS={};
const reg=(u,f)=>{(GENS[u]=GENS[u]||[]).push(f);};
const genQ=u=>pick(GENS[u])();
/* ============ 中学1年 ============ */
reg('j1',()=>{const t='正負の数';const v=ri(0,3);
  if(v===0){const a=ri(-9,9),b=ri(-9,-1),op=pick(['+',M]);
    const ans=op==='+'?a+b:a-b;
    return numMC(`${fm(a)} ${op} ${pn(b)} を計算せよ。`,t,ans,
      `負の数の${op==='+'?'加法':'減法'}。${fm(a)} ${op} (${fm(b)}) = <b>${fm(ans)}</b>`);}
  if(v===1){const a=ri(2,9)*pick([1,-1]),b=ri(2,9)*pick([1,-1]);
    return numMC(`${pn(a)} × ${pn(b)} を計算せよ。`,t,a*b,
      `同符号の積は正、異符号の積は負。絶対値の積は ${Math.abs(a*b)}。答えは <b>${fm(a*b)}</b>`);}
  if(v===2){const b=ri(2,9)*pick([1,-1]),q=ri(2,9)*pick([1,-1]),a=b*q;
    return numMC(`${pn(a)} ÷ ${pn(b)} を計算せよ。`,t,q,

  const a=[ri(-3,3),ri(-3,3),ri(-3,3)],b=[ri(-3,3),ri(-3,3),ri(-3,3)];
  const d=a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
  return numMC(`${va} = (${a.map(fm).join(', ')})、${vb} = (${b.map(fm).join(', ')}) のとき、内積 ${va}・${vb} を求めよ。`,t,d,
    `対応する成分の積の和: ${a.map((x,i)=>`${pn(x)}×${pn(b[i])}`).join(' + ')} = <b>${fm(d)}</b>`);});
reg('mC',()=>{const t='複素数平面';const v=ri(0,2);
  const I=it('i'),Z=it('z');
  if(v===0){const bank=[[3,4,5],[5,12,13],[8,15,17],[1,1,rt(2)],[2,2,srt(2,2)]];
    const[re,im,L]=pick(bank);
    return mk(`複素数 ${Z} = ${poly([re,''],[im,I])} の絶対値 |${Z}| を求めよ。`,t,
      String(typeof L==='number'?fm(L):L),[fm(re+im),String(typeof L==='number'?srt(1,L*L-1):fm(2)),fm(Math.abs(re-im)||7),fm(re*im)],
      `|${Z}| = ${rt(`${fm(re)}² + ${fm(im)}²`)} = <b>${typeof L==='number'?fm(L):L}</b>`);}
  if(v===1){const bank=[['1 + '+it('i'),1,4],[M+'1 + '+it('i'),3,4],['1 + '+srt(1,3)+it('i'),1,3],[srt(1,3)+' + '+it('i'),1,6],[M+'1 '+M+' '+it('i'),5,4]];
    const[zs,n,d]=pick(bank);
    const f=(nn,dd)=>dd===1?`${fm(nn)}π`:fr(nn===1?'π':`${fm(nn)}π`,fm(dd));
    return mk(`複素数 ${Z} = ${zs} の偏角 arg ${Z} を求めよ。ただし 0 ≦ arg ${Z} < 2π とする。`,t,
      f(n,d),[f(n+1,d),f(n,d===4?3:4),f(d,n===1?2:n),f(n+2,d)],
      `複素数平面上で点 ${zs} の表す角を考える。<b>arg ${Z} = ${f(n,d)}</b>`);}
  const bank=[[3,3,M+'1'],[4,2,I],[6,3,I],[2,4,'1'],[6,6,M+'1'],[3,6,'1']];
  const[k,n,ans]=pick(bank);
  const OPT=['1',I,M+'1',M+I];
  const wr=OPT.filter(o=>o!==ans);
  return mk(`${Z} = cos ${fr('π',fm(k))} + ${I} sin ${fr('π',fm(k))} のとき、${Z}${sup(n)} の値を求めよ。`,t,ans,wr,
    `ド・モアブルの定理: ${Z}${sup(n)} = cos ${fr(`${fm(n)}π`,fm(k))} + ${I} sin ${fr(`${fm(n)}π`,fm(k))} = <b>${ans}</b>`);});
reg('mC',()=>{const t='2次曲線';const v=ri(0,2);
  if(v===0){const bank=[[25,9,4],[25,16,3],[169,144,5],[13,4,3],[9,5,2],[16,7,3],[100,36,8]];
    const[A,B,c]=pick(bank);
    const f=cc=>`(±${fm(cc)}, 0)`;
    return mk(`楕円 ${fr(X2,fm(A))} + ${fr(Y+sup(2),fm(B))} = 1 の焦点の座標を求めよ。`,t,
      f(c),[`(0, ±${fm(c)})`,f(c+1),f(Math.round(Math.sqrt(A))),`(±${fm(A-B)}, 0)`],
      `焦点は (±${rt(`${it('a')}² ${M} ${it('b')}²`)}, 0) = (±${rt(A-B)}, 0) = <b>${f(c)}</b>`);}
  if(v===1){const a=ri(1,4);let b=ri(1,4);if(b===a)b=a===4?3:a+1;
    const fs=(p,q)=>p===q?`${Y} = ±${X}`:`${Y} = ±${frq(p,q)}${X}`;
    return mk(`双曲線 ${fr(X2,fm(a*a))} ${M} ${fr(Y+sup(2),fm(b*b))} = 1 の漸近線の方程式を求めよ。`,t,
      fs(b,a),[fs(a,b),fs(b*b,a*a),`${Y} = ±${fm(b)}${X}`],
      `漸近線は ${Y} = ±${fr(it('b'),it('a'))}${X} = <b>${fs(b,a)}</b>`);}
  const p=ri(1,5);
  const f=(a,b)=>`焦点 (${fm(a)}, 0)、準線 ${X} = ${fm(b)}`;
  return mk(`放物線 ${Y}${sup(2)} = ${fm(4*p)}${X} の焦点と準線を求めよ。`,t,
    f(p,-p),[f(-p,p),f(4*p,-4*p),f(p,p),f(2*p,-2*p)],
    `${Y}² = 4${it('p')}${X} の焦点は (${it('p')}, 0)、準線は ${X} = ${M}${it('p')}。4${it('p')} = ${fm(4*p)} より ${it('p')} = ${fm(p)}。<b>${f(p,-p)}</b>`);});

/* ============ 大学受験対策 ============ */
reg('uex',()=>{const t='常用対数(桁数)';
  const bank=[[2,30,10],[2,40,13],[2,50,16],[2,60,19],[2,100,31],[3,20,10],[3,30,15],[3,40,20]];
  const[base,n,ans]=pick(bank);
  const lg=base===2?'0.3010':'0.4771';
  return numMC(`log₁₀ ${fm(base)} = ${lg} とする。${fm(base)}${sup(n)} は何桁の整数か。`,t,ans,
    `log₁₀ ${fm(base)}${sup(n)} = ${fm(n)} × ${lg} = ${fm(Math.round(n*(base===2?.301:.4771)*100)/100)}。整数部分が ${fm(ans-1)} なので <b>${fm(ans)} 桁</b>`,
    k=>`${fm(k)} 桁`);});
reg('uex',()=>{const t='三角関数の最大・最小';
  const[a,b,c]=pick([[3,4,5],[5,12,13],[6,8,10],[8,15,17]]);
  const k=ri(-5,5);
  const askMin=ri(0,1);
  const ans=askMin?k-c:k+c;
  return numMC(`関数 ${Y} = ${poly([a,'sin θ'],[b,'cos θ'],[k,''])} の${askMin?'最小値':'最大値'}を求めよ。`,t,ans,
    `合成: ${Y} = ${rt(`${fm(a)}²+${fm(b)}²`)} sin(θ+α) ${k<0?M:k>0?'+':''} ${k?fm(Math.abs(k)):''} = ${fm(c)} sin(θ+α) ${k<0?M:k>0?'+':''} ${k?fm(Math.abs(k)):''}。${askMin?'最小':'最大'}値は <b>${fm(ans)}</b>`);});
reg('uex',()=>{const t='微分(解の個数)';
  const k=ri(1,3);
  const m=2*k**3;
  const f=(lo,hi)=>`${fm(lo)} < ${it('c')} < ${fm(hi)}`;
  return mk(`3次方程式 ${poly([1,X3],[-3*k*k,X])} + ${it('c')} = 0 が異なる3個の実数解をもつような定数 ${it('c')} の値の範囲を求めよ。`,t,
    f(-m,m),[f(0,m),`${it('c')} < ${fm(-m)}, ${fm(m)} < ${it('c')}`,f(-m+1,m-1),`${it('c')} = ±${fm(m)}`],
    `${it('f')}(${X}) = ${poly([1,X3],[-3*k*k,X])} の極大値は ${fm(m)}、極小値は ${fm(-m)}。グラフと直線 ${Y} = ${M}${it('c')} が3点で交わる条件から <b>${f(-m,m)}</b>`);});
reg('uex',()=>{const t='数列(部分分数分解)';
  const n=ri(5,15);
  return fracMC(`${fr(1,'1・2')} + ${fr(1,'2・3')} + … + ${fr(1,`${fm(n)}・${fm(n+1)}`)} の値を求めよ。`,t,n,n+1,
    `${fr(1,`${it('k')}(${it('k')}+1)`)} = ${fr(1,it('k'))} ${M} ${fr(1,`${it('k')}+1`)} と分解すると途中が消えて 1 ${M} ${fr(1,fm(n+1))} = <b>${frq(n,n+1)}</b>`);});
reg('uex',()=>{const t='条件付き確率';
  const a=ri(3,5),b=ri(3,6);
  return fracMC(`当たり ${fm(a)} 本を含む ${fm(a+b)} 本のくじを、引いたくじは戻さずに2本引く。1本目が当たりであったとき、2本目も当たりである確率を求めよ。`,t,a-1,a+b-1,
    `1本目で当たりが1本減るので、残り ${fm(a+b-1)} 本中当たり ${fm(a-1)} 本。<b>${frq(a-1,a+b-1)}</b>`);});
reg('uex',()=>{const t='積分(面積公式)';
  const a=ri(1,3),b=ri(1,4);
  const s=a+b;
  return fracMC(`放物線 ${Y} = ${poly([1,X2],[-a,X])} と直線 ${Y} = ${fm(b)}${X} で囲まれた図形の面積を求めよ。`,t,s**3,6,
    `交点は ${X} = 0, ${fm(s)}。面積 = ${fr(`|β ${M} α|³`,6)} = ${fr(`${fm(s)}³`,6)} = <b>${frq(s**3,6)}</b>`);});
reg('uex',()=>{const t='ベクトル(内積)';
  const la=ri(2,5),lb=ri(2,6),A=pick([60,120]);
  const d=la*lb/2*(A===60?1:-1);
  return numMC(`△ABC において AB = ${fm(la)}、AC = ${fm(lb)}、∠A = ${fm(A)}${DEG} のとき、内積 ${vec('AB')}・${vec('AC')} を求めよ。`,t,d,
    `${vec('AB')}・${vec('AC')} = |AB||AC| cos A = ${fm(la)}×${fm(lb)}×${pn(A===60?.5:-.5)} = <b>${fm(d)}</b>`);});
/* ============ courses ============ */
const UNITS=[
  {id:'j1',cat:'jhs',name:'中学1年',tab:'中1',color:'#3a7bd5',topics:'正負の数・文字式・一次方程式・比例と反比例・平面図形・空間図形'},
  {id:'j2',cat:'jhs',name:'中学2年',tab:'中2',color:'#2e9e6b',topics:'式の計算・連立方程式・一次関数・図形の性質と角・確率・データの活用'},
  {id:'j3',cat:'jhs',name:'中学3年',tab:'中3',color:'#c98a2b',topics:'展開・因数分解・平方根・二次方程式・y=ax²・三平方の定理・円'},
  {id:'jex',cat:'jhs',name:'高校受験対策',tab:'受験',color:'#c9333f',exam:true,topics:'入試典型問題(式の値・放物線と直線・相似・空間図形・規則性・確率)'},
  {id:'m1',cat:'hs',name:'数学Ⅰ',tab:'Ⅰ',color:'#3a7bd5',topics:'数と式・集合と命題・二次関数・二次不等式・図形と計量・データの分析'},
  {id:'mA',cat:'hs',name:'数学A',tab:'A',color:'#2e9e6b',topics:'場合の数・確率・整数の性質・図形の性質'},
  {id:'m2',cat:'hs',name:'数学Ⅱ',tab:'Ⅱ',color:'#7a5fc9',topics:'式と証明・複素数と方程式・図形と方程式・三角関数・指数対数・微分積分'},
  {id:'mB',cat:'hs',name:'数学B',tab:'B',color:'#c98a2b',topics:'数列(等差・等比・Σ・漸化式)・統計的な推測'},
  {id:'m3',cat:'hs',name:'数学Ⅲ',tab:'Ⅲ',color:'#b0578d',topics:'極限・無限級数・微分法・積分法'},
  {id:'mC',cat:'hs',name:'数学C',tab:'C',color:'#2b8a9e',topics:'平面ベクトル・空間ベクトル・複素数平面・2次曲線'},
  {id:'uex',cat:'hs',name:'大学受験対策',tab:'受験',color:'#c9333f',exam:true,topics:'入試典型問題(常用対数・三角関数・微積分・数列・確率・ベクトル)'},
];
const QN=10;
const timeFor=u=>u.exam?60:u.cat==='jhs'?40:50;
const RANKS=[[10,'S','合格確実'],[8,'A','合格圏内'],[6,'B','あと一歩'],[4,'C','要復習'],[0,'D','基礎から']];

/* ============ storage ============ */
const LSKEY='nyushi-math-drill-v1';
let best={};
try{best=JSON.parse(localStorage.getItem(LSKEY)||'{}')||{};}catch(e){best={};}
const saveBest=()=>{try{localStorage.setItem(LSKEY,JSON.stringify(best));}catch(e){}};

/* ============ home ============ */
function renderHome(){
  for(const cat of['jhs','hs']){
    const g=$('grid-'+cat);g.innerHTML='';
    for(const u of UNITS.filter(x=>x.cat===cat)){
      const b=best[u.id];
      const el=document.createElement('button');
      el.className='ucard';el.style.setProperty('--uc',u.color);
      el.innerHTML=`<span class="utab">${u.tab}</span>
        <span class="uname">${u.name}${u.exam?'<span class="exam-b">入試</span>':''}</span>
        <span class="utopics">${u.topics}</span>
        <span class="ubest"><span>自己ベスト</span><b>${b?`${b.score}点 (${b.correct}/${QN})`:'─'}</b></span>`;
      el.addEventListener('click',()=>startGame(u));
      g.appendChild(el);
    }
  }
}

/* ============ game state ============ */
let S=null,tick=null;
function show(id){for(const s of['scr-home','scr-game','scr-res'])$(s).classList.toggle('hide',s!==id);window.scrollTo(0,0);}
function makeQuiz(uid){
  const qs=[],seen=new Set();let guard=0;
  while(qs.length<QN&&guard<300){guard++;const q=genQ(uid);
    if(seen.has(q.q))continue;seen.add(q.q);qs.push(q);}
  while(qs.length<QN)qs.push(genQ(uid));
  return qs;
}
function startGame(u){
  S={u,qs:makeQuiz(u.id),i:0,score:0,streak:0,maxStreak:0,correct:0,locked:false,tmax:timeFor(u)*1000,tleft:0};
  $('g-unit').textContent=u.name;
  $('g-score').textContent='0';
  $('g-streak').classList.add('hide');
  show('scr-game');showQ();
}
function stopTimer(){if(tick){clearInterval(tick);tick=null;}}
function showQ(){
  const q=S.qs[S.i];S.locked=false;
  $('g-num').textContent=`第${S.i+1}問`;
  $('g-prog').textContent=`${S.i+1} / ${QN}`;
  $('g-topic').textContent=q.topic;
  $('g-q').innerHTML=q.q;
  $('g-fb').classList.add('hide');
  const box=$('g-choices');box.innerHTML='';
  q.c.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='ch';
    b.innerHTML=`<span class="no">${'①②③④'[i]}</span><span class="cv">${c}</span>`;
    b.addEventListener('click',()=>choose(i));
    box.appendChild(b);
  });
  S.tleft=S.tmax;
  const bar=$('g-timer'),tb=$('g-timerbox');tb.classList.remove('low');bar.style.width='100%';
  stopTimer();
  tick=setInterval(()=>{
    S.tleft-=100;
    const r=Math.max(0,S.tleft/S.tmax);
    bar.style.width=(r*100)+'%';
    if(r<.25)tb.classList.add('low');
    if(S.tleft<=0){stopTimer();choose(-1);}
  },100);
}
function choose(i){
  if(!S||S.locked)return;
  S.locked=true;stopTimer();
  const q=S.qs[S.i];
  const btns=[...$('g-choices').children];
  btns.forEach(b=>b.disabled=true);
  const ok=i===q.a;
  btns[q.a].classList.add('correct');
  if(i>=0&&!ok)btns[i].classList.add('wrong');
  btns.forEach((b,j)=>{if(j!==q.a&&j!==i)b.classList.add('dim');});
  let gained=0;
  if(ok){
    S.correct++;S.streak++;S.maxStreak=Math.max(S.maxStreak,S.streak);
    gained=100+Math.ceil(S.tleft/S.tmax*50)+Math.min(S.streak-1,5)*10;
    S.score+=gained;
  }else{S.streak=0;}
  $('g-score').textContent=S.score;
  const chip=$('g-streak');
  if(S.streak>=2){chip.textContent=`${S.streak}連続○`;chip.classList.remove('hide');
    chip.classList.remove('pop');void chip.offsetWidth;chip.classList.add('pop');}
  else chip.classList.add('hide');
  const fb=$('g-fb');
  fb.classList.remove('hide','ok','ng');
  fb.classList.add(ok?'ok':'ng');
  $('g-mark').textContent=ok?'○':'✗';
  $('g-fbh').textContent=ok?`正解！ +${gained}点`:(i<0?'時間切れ…':'不正解…');
  $('g-fbe').innerHTML=`<b>解説</b>　${q.e}`;
  $('btn-next').textContent=S.i===QN-1?'結果を見る ▸':'次へ ▸';
  $('btn-next').focus();
}
function next(){
  if(!S||!S.locked)return;
  if(S.i===QN-1){endGame();return;}
  S.i++;showQ();
}
function endGame(){
  stopTimer();
  const[,rk,rt2]=RANKS.find(r=>S.correct>=r[0]);
  $('r-unit').textContent=`${S.u.name}　─　結果`;
  $('r-rank').textContent=rk;
  $('r-rankt').textContent=rt2;
  $('r-score').textContent=S.score;
  $('r-correct').textContent=`${S.correct}/${QN}`;
  $('r-streak').textContent=S.maxStreak;
  const b=best[S.u.id];
  const isNew=!b||S.score>b.score;
  if(isNew){best[S.u.id]={score:S.score,correct:S.correct};saveBest();}
  $('r-best').classList.toggle('hide',!isNew);
  $('r-hi').textContent=(best[S.u.id]||{score:0}).score;
  show('scr-res');
}
/* ============ wiring ============ */
$('btn-next').addEventListener('click',next);
$('btn-quit').addEventListener('click',()=>{stopTimer();S=null;renderHome();show('scr-home');});
$('btn-retry').addEventListener('click',()=>startGame(S.u));
$('btn-home').addEventListener('click',()=>{S=null;renderHome();show('scr-home');});
document.addEventListener('keydown',e=>{
  if(!S||$('scr-game').classList.contains('hide'))return;
  if(e.key>='1'&&e.key<='4'&&!S.locked){const b=$('g-choices').children[+e.key-1];if(b)b.click();}
  else if(e.key==='Enter'&&S.locked){e.preventDefault();next();}
});
renderHome();

</script>
